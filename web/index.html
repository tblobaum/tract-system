<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TRACT VISUAL</title>
<style>
body {
  margin:0;
  background:#05070b;
  color:#e8edf2;
  font-family:monospace;
}
.container {
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}
.node {
  border:1px solid #1d3344;
  border-radius:12px;
  padding:12px;
  margin:8px;
  width:260px;
  text-align:center;
}
.node.active {
  border-color:gold;
  background:rgba(214,162,58,.1);
}
.symbol {
  font-size:28px;
}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const ws = new WebSocket("ws://localhost:3000");
const app = document.getElementById("app");

let nodes = [];

ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);
  render(data);
};

function render(data) {
  app.innerHTML = "";

  const current = data.state.step;

  data.fullStack.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "node" + (i === current ? " active" : "");

    div.innerHTML = `
      <div class="symbol">${item.symbol}</div>
      <strong>${item.name}</strong><br>
      <small>${item.code}</small>
    `;

    app.appendChild(div);
  });
}
</script>
</body>
</html>
